<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./../style/global.css">
  <link rel="stylesheet" href="./../style/login.css">
  <script src="./assets/js/jquery-3.6.0.min.js"></script>
  <title>DevCave - Logins</title>
</head>

<body>
  <div id="wrapper">
    <div id="banner" class="left Screen">
      <div id="announce">
        <h1>Finance<span id="dollarSign">&dollar;</span></h1>
        <p>Keep track of your Finance with ease</p>
      </div>
    </div>
    <main class="right Screen">
      <h2>Login</h2>
        <form action="">
          <fieldset>
            
            <div id="emailDiv" class="inputBox">
              <input type="email" name="email" id="email" required>
              <label for="email">Email</label>
            </div>

            <div id="passwordDiv" class="inputBox">
              <input type="password" name="password" id="password" required>
              <label for="password">Password</label>
            </div>
            
            <div id="btnArea">
              <input type="submit" class="btn"  id="login" value="Login">
              <a href="#" class="btn" id="fgtPassword" title="Ask for another password">Forgot password</a>
            </div>
          </fieldset>
          
        </form>
    </main>
  </div>
</body>
</html>
