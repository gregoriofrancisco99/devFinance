<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./../style/global.css">
  <link rel="stylesheet" href="./../style/talkToUs.css">
  <title>Contact Us</title>
</head>
<body>
  <section>
    <div id="container">
      <div id="contactInfo">
        <div>
          <h2>Contact Info</h2>
          <ul id="info">
            <li>
              <span><img src="./../icons/map-marker-alt.svg" alt="Map Marker"></i></span>
              <span>27 de Março <br />
                Lobito, Benguela</span>
            </li>
            <li>
              <span><img src="./../icons/envelope.svg" alt="Envelope Icon"></i></span>
              <span>gregoriofrancisco2014@gmail.com</span>
            </li>
            <li>
              <span><img src="./../icons/phone-alt.svg" alt="Phone Icon"></i></span>
              <span>998-830-805</span>
            </li>
          </ul>
        </div>
        <ul id="sci">
          <li><a href="#"><img id="fb" src="./../icons/facebook-f.svg" alt="Facebook Icon"></a></li>
          <li><a href="#"><img src="./../icons/instagram.svg" alt="Instagram Icon"></a></li>
          <li><a href="#"><img src="./../icons/linkedin-in.svg" alt="LinkedIn Icon"></a></li>
          <li><a href="#"><img src="./../icons/twitter.svg" alt="Twitter Icon"></a></li>
          <li><a href="#"><img src="./../icons/whatsapp.svg" alt="Whatsapp Icon"></a></li>
        </ul>
      </div>
      <div id="contactForm">
        <h2>Send Message</h2>
        <div id="formBox">
          <div class="inputBox w50">
            <input type="text" required>
            <span>First Name</span>
          </div>
          <div class="inputBox w50">
            <input type="text" required>
            <span>Last Name</span>
          </div>
          <div class="inputBox w50">
            <input type="text" required>
            <span>Email Adress</span>
          </div>
          <div class="inputBox w50">
            <input type="text" required>
            <span>Mobile Number</span>
          </div>
          <div class="inputBox w100">
            <textarea required></textarea>
            <span>Write your message here...</span>
          </div>
          <div class="inputBox w100">
            <input type="submit" value="Send">
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
